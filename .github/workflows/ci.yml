name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  CLEANROOM_ENABLE_TOR: "false"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check cleanroom/ tests/

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: pytest -m "unit or integration" -v --asyncio-mode=auto

  e2e:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ADB
        run: sudo apt-get update && sudo apt-get install -y android-tools-adb
      - name: Load kernel modules
        run: |
          sudo modprobe binder_linux devices=binder,hwbinder,vndbinder || true
          sudo modprobe ashmem_linux || true
      - name: Check prerequisites
        run: |
          for f in /dev/kvm /dev/binder /dev/ashmem; do
            [ -e "$f" ] && echo "$f: OK" || echo "$f: MISSING (e2e will skip)"
          done
          which adb && adb version
      - run: pip install -e ".[dev]"
      - name: Pull ReDroid image
        run: docker pull redroid/redroid:12.0.0-latest
      - name: Build Tor sidecar
        run: docker build -t cleanroom-tor:latest docker/tor-sidecar/
      - run: pytest -m e2e -v --asyncio-mode=auto
  
  deploy:
    runs-on: ubuntu-latest
    needs: [lint, test, e2e]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to VPS
        uses: appleboy/ssh-action@1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/cleanroom
            git pull origin main
            .venv/bin/pip install -e . --quiet
            sudo systemctl restart cleanroom
            sleep 5
            curl -sf http://localhost:8000/health || (echo "Health check failed" && exit 1)
            echo "Deploy successful"
