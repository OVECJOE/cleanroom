# Listen on all interfaces so the Android container can connect to us.
Listen 0.0.0.0
Port 8888

# Forward everything through Tor's SOCKS5
upstream socks5 127.0.0.1:9050 "*"

# Allow connections from any source on our bridge network
Allow 0.0.0.0/0

# Logging
LogLevel Warning

# Do not add X-Forwarded-For header (removes the Android container's IP)
DisableViaHeader Yes